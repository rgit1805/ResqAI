<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Risk Map | ResQ-AI</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #map {
            height: 600px;
            width: 100%;
            border-radius: 12px;
            z-index: 1;
        }
    </style>
</head>

<body>
    <nav class="glass glass-nav">
        <div class="logo"><i class="fas fa-shield-alt"></i> ResQ-AI</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Prediction</a>
            <a href="map.html" style="color: var(--accent-color);">Live Map</a>
            <a href="resources.html">Resources</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">Live
            Disaster Zones</h2>

        <div class="glass card" style="padding: 1rem;">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map').setView([20.5937, 78.9629], 5); // India Centered

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Dummy Data for Disaster Zones
        const disasterZones = [
            { lat: 25.3176, lng: 82.9739, type: 'Flood', risk: 'High', color: 'red' }, // Varanasi
            { lat: 13.0827, lng: 80.2707, type: 'Cyclone', risk: 'Medium', color: 'orange' }, // Chennai
            { lat: 28.7041, lng: 77.1025, type: 'Air Quality', risk: 'Hazardous', color: 'purple' }, // Delhi
            { lat: 19.0760, lng: 72.8777, type: 'Flood', risk: 'Medium', color: 'orange' } // Mumbai
        ];

        disasterZones.forEach(zone => {
            L.circle([zone.lat, zone.lng], {
                color: zone.color,
                fillColor: zone.color,
                fillOpacity: 0.5,
                radius: 50000
            }).addTo(map)
                .bindPopup(`<b>${zone.type}</b><br>Risk: ${zone.risk}`);
        });

    </script>
</body>

</html>

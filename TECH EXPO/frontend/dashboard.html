<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Dashboard | ResQ-AI</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="glass glass-nav">
        <div class="logo"><i class="fas fa-shield-alt"></i> ResQ-AI</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html" style="color: var(--accent-color);">Prediction</a>
            <a href="map.html">Live Map</a>
            <a href="resources.html">Resources</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">Disaster Prediction Engine</h2>
        
        <div class="dashboard-grid">
            <!-- Flood Prediction Module -->
            <div class="glass card">
                <h3><i class="fas fa-water"></i> Flood Risk Analysis</h3>
                <form id="floodForm">
                    <div class="form-group">
                        <label>Rainfall (mm)</label>
                        <input type="number" id="rainfall" class="form-input" placeholder="e.g. 150" required>
                    </div>
                    <div class="form-group">
                        <label>Humidity (%)</label>
                        <input type="number" id="humidity" class="form-input" placeholder="e.g. 85" required>
                    </div>
                    <div class="form-group">
                        <label>River Level (m)</label>
                        <input type="number" id="river_level" class="form-input" placeholder="e.g. 5.5" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Analyze Risk</button>
                </form>
                <div id="floodResult" class="result">
                    <h4>Analysis Result:</h4>
                    <p id="floodOutput">Pending...</p>
                </div>
            </div>

            <!-- Earthquake Prediction Module -->
            <div class="glass card">
                <h3><i class="fas fa-rss"></i> Seismic Activity Analysis</h3>
                <form id="quakeForm">
                    <div class="form-group">
                        <label>Magnitude (Richter)</label>
                        <input type="number" id="magnitude" step="0.1" class="form-input" placeholder="e.g. 6.5" required>
                    </div>
                    <div class="form-group">
                        <label>Depth (km)</label>
                        <input type="number" id="depth" class="form-input" placeholder="e.g. 10" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Analyze Risk</button>
                </form>
                <div id="quakeResult" class="result">
                    <h4>Analysis Result:</h4>
                    <p id="quakeOutput">Pending...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
